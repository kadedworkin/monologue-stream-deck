<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Monologue PTT Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #2d2d2d;
      color: #d0d0d0;
      margin: 0;
      padding: 16px;
      font-size: 13px;
    }
    label { display: block; margin-bottom: 6px; color: #999; }
    input[type=number] {
      width: 100%;
      padding: 6px 8px;
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #eee;
      font-size: 13px;
      box-sizing: border-box;
    }
    .hint {
      margin-top: 6px;
      font-size: 11px;
      color: #666;
    }
  </style>
</head>
<body>
  <label for="keycode">Keycode (default: 61 = Right Option)</label>
  <input type="number" id="keycode" value="61" min="0" max="127">
  <p class="hint">Right Option = 61 &nbsp;|&nbsp; Right Command = 54 &nbsp;|&nbsp; Right Shift = 60</p>

  <script>
    const websocketUrl = new URLSearchParams(location.search).get('websocket');
    const uuid = new URLSearchParams(location.search).get('uuid');
    const registerEvent = new URLSearchParams(location.search).get('registerEvent');
    const actionInfo = JSON.parse(decodeURIComponent(new URLSearchParams(location.search).get('info') || '{}'));

    let ws;
    const input = document.getElementById('keycode');

    function connect() {
      ws = new WebSocket(websocketUrl);
      ws.onopen = () => {
        ws.send(JSON.stringify({ event: registerEvent, uuid }));
        ws.send(JSON.stringify({ event: 'getSettings', context: uuid }));
      };
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.event === 'didReceiveSettings' && msg.payload?.settings?.keycode !== undefined) {
          input.value = msg.payload.settings.keycode;
        }
      };
    }

    input.addEventListener('change', () => {
      ws?.send(JSON.stringify({
        event: 'setSettings',
        context: uuid,
        payload: { keycode: parseInt(input.value, 10) || 61 }
      }));
    });

    connect();
  </script>
</body>
</html>
